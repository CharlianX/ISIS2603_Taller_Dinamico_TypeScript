<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <title>UwU - Colony House</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #fdfbfb, #f5eff1, #eef2f5, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #4a4a4a;
        }

        .fancy-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            color: #2c3e50;
            letter-spacing: -1px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.05);
        }

        .subtitle-fancy {
            font-family: 'Playfair Display', serif;
            color: #2c3e50;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>

<body>
    <div class="container mt-5 mb-5">
        <h1 class="text-center mb-5 fancy-title" id="name"></h1>

        <div class="row align-items-center justify-content-center mb-5">
            <div class="col-md-5 mb-4 mb-md-0">
                <img class="img-fluid rounded shadow-lg" alt="Colony House" style="border-radius: 20px !important;" id="imageUrl">
            </div>

            <div class="col-md-5 d-flex flex-column justify-content-between" style="min-height: 250px;">
                <div class="p-3 glass-panel text-center mb-3">
                    <span class="text-muted d-block small text-uppercase" style="letter-spacing: 1px;">Fecha de debut</span>
                    <strong class="fs-5" id="debutYear"></strong>
                </div>
                <div class="p-3 glass-panel text-center mb-3">
                    <span class="text-muted d-block small text-uppercase" style="letter-spacing: 1px;">Integrantes</span>
                    <strong class="fs-5" id="members"></strong> <span class="text-muted small" id="membersNames"></span>
                </div>
                <div class="p-3 glass-panel text-center">
                    <span class="text-muted d-block small text-uppercase" style="letter-spacing: 1px;">Número de álbums</span>
                    <strong class="fs-5" id="albums"></strong>
                </div>
            </div>
        </div>

        <div class="row justify-content-center my-5 pt-3">
            <div class="col-md-8 position-relative glass-panel px-5 py-4 text-center">
                <span style="font-family: 'Playfair Display', serif; font-size: 4rem; color: #d0a4b4; position: absolute; top: -15px; left: 15px; opacity: 0.5;">❝</span>
                <p class="mb-0 text-muted fst-italic" style="font-size: 1.05rem; line-height: 1.8;" id="description">
                </p>
                <span style="font-family: 'Playfair Display', serif; font-size: 4rem; color: #d0a4b4; position: absolute; bottom: -45px; right: 15px; opacity: 0.5;">❞</span>
            </div>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-10">
                <h3 class="text-center mb-4 subtitle-fancy fs-2">Top 5 Canciones</h3>
                
                <div class="glass-panel overflow-hidden">
                    <table class="table table-hover table-borderless mb-0 align-middle" style="background: transparent;">
                        <thead class="border-bottom text-muted small text-uppercase text-center" style="letter-spacing: 1px;">
                            <tr>
                                <th class="text-start ps-4 py-3" style="background: transparent;">Nombre de la canción</th>
                                <th style="background: transparent;">Álbum</th>
                                <th style="background: transparent;">Reproducciones</th>
                                <th style="background: transparent;">Año</th>
                                <th class="pe-4" style="background: transparent;">Duración</th>
                            </tr>
                        </thead>
                        <tbody class="text-center" id="topSongs">
                          
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./scripts/main.js"></script>
</body>

</html>
